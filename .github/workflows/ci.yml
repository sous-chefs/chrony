name: ci

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@8.0.4
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write
    secrets: inherit

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - "almalinux-9"
          - "almalinux-10"
          - "amazonlinux-2023"
          - "centos-stream-9"
          - "centos-stream-10"
          - "debian-12"
          - "fedora-latest"
          - "oraclelinux-9"
          - "oraclelinux-10"
          - "rockylinux-9"
          - "rockylinux-10"
          - "ubuntu-22.04"
          - "ubuntu-24.04"
        suite:
          - "default"
          - "server"
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@8.0.4
        with:
          version: "25"
      - name: Dokken
        env:
          CHEF_VERSION: "18"
          CHEF_LICENSE: accept-no-persist
          KITCHEN_PRODUCT_NAME: cinc
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
          INSTANCE_NAME: ${{ matrix.suite }}-${{ matrix.os }}
        run: |
          INSTANCE="${INSTANCE_NAME//./}"
          kitchen test "$INSTANCE" || {
            kitchen exec "$INSTANCE" -c 'systemctl status chronyd --no-pager -l || true'
            kitchen exec "$INSTANCE" -c 'journalctl -xeu chronyd --no-pager -n 100 || true'
            exit 1
          }
