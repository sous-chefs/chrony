---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec
  inspec_tests:
    - path: test/integration/inspec

platforms:
  - name: debian-11
  - name: debian-12
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: rocky-8
  - name: rocky-9
  - name: almalinux-8
  - name: almalinux-9

suites:
  - name: client
    run_list:
      - recipe[test]
      - recipe[chrony::client]
    attributes:
      chrony:
        extra_config:
          - "log measurements statistics tracking"
    verifier:
  - name: server
    run_list:
      - recipe[test]
      - recipe[chrony::server]
    verifier:
      inputs:
        type: "server"
