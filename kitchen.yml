---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: fedora-latest
  - name: oraclelinux-9
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[test::default]
    verifier:
      inspec_tests:
        - path: test/integration/default
  - name: server
    run_list:
      - recipe[test::server]
    verifier:
      inspec_tests:
        - path: test/integration/server
